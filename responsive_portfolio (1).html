    <!-- Application UI Logic -->
    <script>
        const categories = ["ALL", "SAAS", "WEB APP", "VIDEO", "DESIGN"];
        let activeCategory = "ALL";
        let activeYear = "ALL";
        let isMobileMenuOpen = false;
        let activeDropdown = null;
        let appInitialized = false;

        function initApp() {
            if (appInitialized) return;
            appInitialized = true;

            // Set current year in footer
            document.getElementById('year').textContent = new Date().getFullYear();

            // Initialize filters
            renderFilters();
            
            // Initial render of projects
            renderProjects();

            // Trigger entrance animations shortly after load
            setTimeout(() => {
                document.getElementById('nav-bar').classList.remove('-translate-y-10', 'opacity-0');
                document.getElementById('header-section').classList.remove('translate-y-10', 'opacity-0');
            }, 100);

            // Add event listeners to mobile links
            document.querySelectorAll('.mobile-link').forEach(link => {
                link.addEventListener('click', () => {
                    if(isMobileMenuOpen) toggleMobileMenu();
                });
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.filter-dropdown-container')) {
                    closeAllDropdowns();
                }
            });
        }

        // Global refresh function (called after local update)
        window.refreshUI = function() {
            renderAdminProjects();
            updateAndAnimateCards();
        }

        // --- MOBILE MENU LOGIC ---
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.querySelector('#mobile-menu-btn i');
            isMobileMenuOpen = !isMobileMenuOpen;
            
            if (isMobileMenuOpen) {
                menu.classList.remove('opacity-0', 'pointer-events-none');
                menu.classList.add('opacity-100', 'pointer-events-auto');
                document.body.style.overflow = 'hidden'; // Prevent background scrolling
                icon.setAttribute('data-lucide', 'x');
            } else {
                menu.classList.remove('opacity-100', 'pointer-events-auto');
                menu.classList.add('opacity-0', 'pointer-events-none');
                document.body.style.overflow = ''; // Restore scrolling
                icon.setAttribute('data-lucide', 'menu');
            }
            lucide.createIcons();
        }

        // --- DROPDOWN LOGIC ---
        function toggleDropdown(id) {
            const menu = document.getElementById(id);
            const isClosing = menu.classList.contains('opacity-100');
            
            closeAllDropdowns();
            
            if (!isClosing) {
                menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2');
                menu.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                activeDropdown = id;
            }
        }

        function closeAllDropdowns() {
            ['category-menu', 'year-menu'].forEach(id => {
                const menu = document.getElementById(id);
                if (menu) {
                    menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                    menu.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                }
            });
            activeDropdown = null;
        }

        function renderFilters() {
            const catContainer = document.getElementById('category-menu');
            const yearContainer = document.getElementById('year-menu');
            
            const baseClasses = "w-full text-left px-5 py-3 text-[10px] sm:text-xs tracking-widest font-semibold transition-all duration-200 focus:outline-none flex justify-between items-center";
            const activeClasses = "bg-[#d4ff00]/10 text-[#d4ff00]";
            const inactiveClasses = "text-gray-400 hover:text-white hover:bg-white/5";

            // Update Selected Text in the buttons
            document.getElementById('selected-category').textContent = activeCategory;
            document.getElementById('selected-year').textContent = activeYear;

            // Render Categories
            catContainer.innerHTML = categories.map(cat => {
                const isActive = activeCategory === cat;
                return `
                    <button 
                        onclick="handleCategoryChange('${cat}')"
                        class="${baseClasses} ${isActive ? activeClasses : inactiveClasses}"
                    >
                        ${cat}
                        ${isActive ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                    </button>
                `;
            }).join('');

            // Extract unique years from projects dynamically
            const dynamicYears = ["ALL", ...new Set(window.projects.map(p => p.year))].sort().reverse();
            
            // Render Years
            yearContainer.innerHTML = dynamicYears.map(year => {
                const isActive = activeYear === year;
                return `
                    <button 
                        onclick="handleYearChange('${year}')"
                        class="${baseClasses} ${isActive ? activeClasses : inactiveClasses}"
                    >
                        ${year}
                        ${isActive ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                    </button>
                `;
            }).join('');

            lucide.createIcons(); // Ensure checkmark icons render inside the menu
        }

        function handleCategoryChange(newCat) {
            if (newCat !== activeCategory) {
                activeCategory = newCat;
                updateAndAnimateCards();
            }
            closeAllDropdowns();
        }

        function handleYearChange(newYear) {
            if (newYear !== activeYear) {
                activeYear = newYear;
                updateAndAnimateCards();
            }
            closeAllDropdowns();
        }

        function updateAndAnimateCards() {
            renderFilters(); // Update button styles

            // Animate cards out
            const cards = document.querySelectorAll('.project-card');
            cards.forEach(card => {
                card.style.transitionDelay = '0ms'; // Remove staggered delay for exit
                card.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
                card.classList.add('opacity-0', 'scale-95');
            });

            // Wait for fade out, then render new cards
            setTimeout(() => {
                renderProjects();
            }, 300);
        }

        function renderProjects() {
            const container = document.getElementById('projects-grid');
            
            // Filter by both Category and Year
            const filteredProjects = window.projects.filter(p => {
                const matchCategory = activeCategory === "ALL" || p.category === activeCategory;
                const matchYear = activeYear === "ALL" || p.year === activeYear;
                return matchCategory && matchYear;
            });

            // Update counter
            document.getElementById('project-count').innerHTML = `
                <span class="text-[#d4ff00] font-bold">${filteredProjects.length}</span> / ${window.projects.length} projects
            `;

            if (filteredProjects.length === 0) {
                // Empty State HTML
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 sm:py-32 text-center border border-dashed border-white/10 rounded-2xl bg-[#0f0f0f] project-card opacity-0 translate-y-10 transition-all duration-500">
                        <div class="bg-black/50 p-5 rounded-full mb-6 border border-white/5">
                            <i data-lucide="folder-search-2" class="w-8 h-8 sm:w-10 sm:h-10 text-gray-600"></i>
                        </div>
                        <h3 class="text-xl sm:text-2xl font-black text-white mb-2 tracking-tight">NO PROJECTS INITIALIZED</h3>
                        <p class="text-xs sm:text-sm text-gray-500 max-w-sm mx-auto leading-relaxed px-4">
                            There are no projects matching the selected criteria. Try adjusting your filters or check back later.
                        </p>
                    </div>
                `;
            } else {
                // Build HTML for cards
                container.innerHTML = filteredProjects.map((project, index) => `
                    <a href="${project.link}" 
                       class="project-card group block bg-[#0f0f0f] rounded-2xl p-4 sm:p-5 border border-white/5 hover:border-[#d4ff00]/30 transition-all duration-500 transform hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.5)] opacity-0 translate-y-10"
                       style="transition-delay: ${index * 100}ms">
                        
                        <div class="w-full h-56 sm:h-64 md:h-72 rounded-xl mb-4 sm:mb-6 relative overflow-hidden bg-gradient-to-br ${project.gradient} transition-transform duration-500 group-hover:scale-[1.02]">
                            
                            <!-- Project Image -->
                            ${project.imageUrl ? `<img src="${project.imageUrl}" alt="${project.title}" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-500 group-hover:scale-105" onerror="this.style.display='none'">` : ''}

                            <!-- Grid overlay (kept for texture) -->
                            <div class="absolute inset-0 opacity-20 mix-blend-overlay pointer-events-none" style="background-image: linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px); background-size: 30px 30px"></div>

                            <!-- Top Tags -->
                            <div class="absolute top-3 left-3 right-3 sm:top-4 sm:left-4 sm:right-4 flex justify-between items-start z-10">
                                <span class="text-[9px] sm:text-[10px] font-bold tracking-widest text-gray-300 sm:text-gray-400 uppercase bg-black/50 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10">
                                    ${project.category}
                                </span>
                                <span class="text-[9px] sm:text-[10px] font-mono tracking-widest text-gray-300 sm:text-gray-500 bg-black/50 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10">
                                    ${project.year}
                                </span>
                            </div>

                            <!-- Hover Overlay Link Icon -->
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                                <div class="bg-[#d4ff00] text-black p-3 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 shadow-[0_0_20px_rgba(212,255,0,0.4)]">
                                    <i data-lucide="external-link" class="w-5 h-5"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="px-1 sm:px-2 flex flex-col h-[calc(100%-15rem)] sm:h-[calc(100%-17.5rem)] md:h-[calc(100%-19.5rem)]">
                            <h3 class="text-lg sm:text-xl md:text-2xl font-bold mb-2 sm:mb-3 tracking-tight group-hover:text-[#d4ff00] transition-colors line-clamp-1">
                                ${project.title}
                            </h3>
                            <p class="text-xs sm:text-sm text-gray-400 leading-relaxed mb-4 sm:mb-6 line-clamp-2">
                                ${project.description}
                            </p>
                            
                            <!-- Tech Stack Tags -->
                            <div class="flex flex-wrap gap-1.5 sm:gap-2 mt-auto">
                                ${project.tech.map(t => `
                                    <span class="text-[9px] sm:text-[10px] font-mono tracking-widest text-gray-400 sm:text-gray-500 border border-white/10 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full bg-white/5">
                                        ${t}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </a>
                `).join('');
            }

            // Initialize Lucide icons
            lucide.createIcons();

            // Trigger entrance animations by removing initial hidden classes
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const cards = document.querySelectorAll('.project-card');
                    cards.forEach(card => {
                        card.classList.remove('opacity-0', 'translate-y-10', 'scale-95');
                        card.classList.add('opacity-100', 'translate-y-0', 'scale-100');
                    });
                }, 50);
            });
        }

        // --- TEMPORARY SAVE STATUS ---
        window.showTemporarySaveStatus = function() {
            const statusEl = document.getElementById('save-status');
            if(statusEl) {
                statusEl.classList.remove('hidden');
                statusEl.classList.add('flex');
                statusEl.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4 text-[#d4ff00]"></i> Changes applied (Export to save)';
                lucide.createIcons();
                setTimeout(() => {
                    statusEl.classList.add('hidden');
                    statusEl.classList.remove('flex');
                }, 3000);
            }
        };

        async function generateHTMLContent() {
            // Instead of fetching the URL (which fails on blob/iframe networks), 
            // clone the live document to build a clean source code layout.
            const clone = document.documentElement.cloneNode(true);
            
            // Clean up transient UI states
            const panel = clone.querySelector('#admin-panel');
            if(panel) panel.classList.add('hidden', 'opacity-0');
            
            const pwdModal = clone.querySelector('#password-modal');
            if(pwdModal) pwdModal.classList.add('hidden', 'opacity-0');
            
            const mobileMenu = clone.querySelector('#mobile-menu');
            if(mobileMenu) {
                mobileMenu.classList.add('opacity-0', 'pointer-events-none');
                mobileMenu.classList.remove('opacity-100', 'pointer-events-auto');
            }

            clone.querySelector('body').style.overflow = '';
            
            // Clear dynamically generated lists so they rebuild cleanly on next load
            const grid = clone.querySelector('#projects-grid');
            if(grid) grid.innerHTML = '';

            const catMenu = clone.querySelector('#category-menu');
            if(catMenu) catMenu.innerHTML = '';

            const yearMenu = clone.querySelector('#year-menu');
            if(yearMenu) yearMenu.innerHTML = '';

            const adminList = clone.querySelector('#admin-projects-list');
            if(adminList) adminList.innerHTML = '';

            const count = clone.querySelector('#project-count');
            if(count) count.innerHTML = '';
            
            // Re-inject the updated JSON payload securely back into the script tag
            const dataScript = clone.querySelector('#portfolio-data');
            if (dataScript) {
                const projectsJson = JSON.stringify(window.projects, null, 12).replace(/<\/script>/g, '<\\/script>');
                dataScript.textContent = `\n        window.projects = ${projectsJson};\n    `;
            }

            return '<!DOCTYPE html>\n' + clone.outerHTML;
        }

        // --- EXPORT HTML SOURCE CODE FEATURE (MANUAL DOWNLOAD) ---
        window.exportSourceCode = async function() {
            try {
                const statusEl = document.getElementById('save-status');
                if(statusEl) {
                    statusEl.classList.remove('hidden');
                    statusEl.classList.add('flex');
                    statusEl.innerHTML = '<i data-lucide="download" class="w-4 h-4 animate-bounce"></i> Generating file...';
                    lucide.createIcons();
                }

                const htmlContent = await generateHTMLContent();
                
                // Trigger an invisible download anchor tag
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'portfolio-updated.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                if(statusEl) {
                    statusEl.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4 text-[#d4ff00]"></i> Export successful';
                    lucide.createIcons();
                    setTimeout(() => {
                        statusEl.classList.add('hidden');
                        statusEl.classList.remove('flex');
                    }, 3000);
                }
            } catch (error) {
                console.error("Failed to export source code:", error);
                const statusEl = document.getElementById('save-status');
                if(statusEl) {
                    statusEl.classList.remove('hidden');
                    statusEl.classList.add('flex');
                    statusEl.innerHTML = '<i data-lucide="x-circle" class="w-4 h-4 text-red-500"></i> Export failed';
                    lucide.createIcons();
                }
            }
        };

        // --- ADMIN PANEL LOGIC ---

        function openPasswordModal() {
            const modal = document.getElementById('password-modal');
            const content = document.getElementById('password-modal-content');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                });
            });
            document.getElementById('admin-password').focus();
        }

        function closePasswordModal() {
            const modal = document.getElementById('password-modal');
            const content = document.getElementById('password-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('admin-password').value = '';
                document.getElementById('password-error').classList.add('hidden');
            }, 300);
        }

        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            // HARDCODED PASSWORD HERE
            if (pass === 'admin123') {
                closePasswordModal();
                setTimeout(openAdminPanel, 300);
            } else {
                document.getElementById('password-error').classList.remove('hidden');
            }
        }

        function openAdminPanel() {
            const panel = document.getElementById('admin-panel');
            panel.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
            renderAdminProjects();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    panel.classList.remove('opacity-0');
                });
            });
        }

        function closeAdminPanel() {
            const panel = document.getElementById('admin-panel');
            panel.classList.add('opacity-0');
            document.body.style.overflow = ''; // Restore background scrolling
            setTimeout(() => {
                panel.classList.add('hidden');
                hideAdminForm();
            }, 500);
        }

        function renderAdminProjects() {
            const list = document.getElementById('admin-projects-list');
            
            if (window.projects.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-center border border-dashed border-white/10 rounded-xl bg-white/5">
                        <i data-lucide="inbox" class="w-10 h-10 text-gray-600 mb-3"></i>
                        <h3 class="text-white font-bold mb-1">NO PROJECTS FOUND</h3>
                        <p class="text-gray-500 text-xs">Click "New Project" to add your first portfolio item.</p>
                    </div>
                `;
            } else {
                list.innerHTML = window.projects.map(p => `
                    <div class="bg-[#111] border border-white/5 p-4 md:p-6 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-[#d4ff00]/30 hover:bg-[#1a1a1a] transition-all group">
                        <div class="w-full sm:w-auto">
                            <h3 class="font-bold text-white text-sm sm:text-base md:text-lg group-hover:text-[#d4ff00] transition-colors truncate">${p.title}</h3>
                            <p class="text-[10px] md:text-xs text-gray-500 font-mono tracking-widest mt-1">${p.category} • ${p.year}</p>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto self-end">
                            <button onclick="showAdminForm(${p.id})" class="flex-1 sm:flex-none justify-center p-2 sm:px-4 sm:py-2 bg-white/5 hover:bg-white/10 rounded-lg text-gray-300 transition-colors flex items-center gap-2 text-xs font-bold">
                                <i data-lucide="edit-2" class="w-4 h-4"></i> <span>Edit</span>
                            </button>
                            <button onclick="deleteProject(${p.id})" class="flex-1 sm:flex-none justify-center p-2 sm:px-4 sm:py-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-lg transition-colors flex items-center gap-2 text-xs font-bold">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> <span>Delete</span>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function showAdminForm(id = null) {
            document.getElementById('admin-list-view').classList.add('hidden');
            document.getElementById('admin-form-view').classList.remove('hidden');
            
            // Populate Category Dropdown
            const catSelect = document.getElementById('proj-category');
            const availableCategories = categories.filter(c => c !== "ALL");
            const allUniqueCats = [...new Set([...availableCategories, ...window.projects.map(p => p.category), "MOBILE APP", "OPEN SOURCE", "PHOTOGRAPHY"])];
            catSelect.innerHTML = allUniqueCats.map(cat => `<option value="${cat}">${cat}</option>`).join('');

            // Populate Year Dropdown
            const yearSelect = document.getElementById('proj-year');
            const currentYear = new Date().getFullYear();
            const projectYears = window.projects.map(p => parseInt(p.year)).filter(y => !isNaN(y));
            const minYear = projectYears.length > 0 ? Math.min(...projectYears) : 2015;
            const maxYear = Math.max(currentYear + 1, ...projectYears);
            
            let yearOptions = '';
            for(let y = maxYear; y >= Math.min(minYear, 2015); y--) {
                yearOptions += `<option value="${y}">${y}</option>`;
            }
            yearSelect.innerHTML = yearOptions;
            
            if (id) {
                document.getElementById('form-title').innerText = 'Edit Project';
                const p = window.projects.find(proj => proj.id === id);
                document.getElementById('proj-id').value = p.id;
                document.getElementById('proj-title').value = p.title;
                document.getElementById('proj-category').value = p.category;
                document.getElementById('proj-year').value = p.year;
                document.getElementById('proj-tech').value = p.tech.join(', ');
                document.getElementById('proj-desc').value = p.description;
                document.getElementById('proj-image-url').value = p.imageUrl || '';
                document.getElementById('proj-gradient').value = p.gradient;
            } else {
                document.getElementById('form-title').innerText = 'Add New Project';
                document.getElementById('proj-id').value = '';
                document.getElementById('proj-title').value = '';
                document.getElementById('proj-category').value = allUniqueCats[0] || 'WEB APP';
                document.getElementById('proj-year').value = currentYear.toString();
                document.getElementById('proj-tech').value = '';
                document.getElementById('proj-desc').value = '';
                document.getElementById('proj-image-url').value = '';
                document.getElementById('proj-gradient').value = 'from-[#1a1a24] to-[#0a0a0f]';
            }
        }

        function hideAdminForm() {
            document.getElementById('admin-list-view').classList.remove('hidden');
            document.getElementById('admin-form-view').classList.add('hidden');
        }

        function saveProject() {
            const id = document.getElementById('proj-id').value;
            const newProject = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('proj-title').value || 'Untitled Project',
                category: (document.getElementById('proj-category').value || 'UNCATEGORIZED').toUpperCase(),
                year: document.getElementById('proj-year').value || new Date().getFullYear().toString(),
                description: document.getElementById('proj-desc').value || '',
                tech: document.getElementById('proj-tech').value.split(',').map(t => t.trim()).filter(t => t),
                link: '#', 
                imageUrl: document.getElementById('proj-image-url').value || '',
                gradient: document.getElementById('proj-gradient').value || 'from-[#1a1a1a] to-[#0a0a0a]'
            };

            if (id) {
                const idx = window.projects.findIndex(p => p.id === parseInt(id));
                if (idx !== -1) window.projects[idx] = newProject;
            } else {
                window.projects.unshift(newProject); // add to top
                if (!categories.includes(newProject.category)) {
                    categories.push(newProject.category);
                }
            }

            hideAdminForm();
            window.refreshUI(); // Refreshes Admin UI + Main Dashboard visually

            // Show status
            window.showTemporarySaveStatus();
        }

        function deleteProject(id) {
            window.projects = window.projects.filter(p => p.id !== id);
            window.refreshUI();
            
            // Show status
            window.showTemporarySaveStatus();
        }

        // Run setup when DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
